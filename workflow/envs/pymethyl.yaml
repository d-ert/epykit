name: pymethyl
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  # Polars (via pip — conda-forge version may lag)
  - pip:
    - polars>=0.19.0
    - pyarrow>=14.0.0
    - anndata>=0.9.0
    - scanpy>=1.9.0
    - statsmodels>=0.14.0
    - py-methyl-toolkit
